version: "3.8"

services:
  backend:
    build: .
    container_name: ai-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./repo:/app/repo
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    container_name: ai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_KEY=secure-key
    depends_on:
      - backend

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama

